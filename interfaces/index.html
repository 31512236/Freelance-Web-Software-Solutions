<!DOCTYPE html>
<html lang="es"> <!--Se deja el idioma español por defecto, pero con JavaScript haremos que el idioma se traduzca a inglés si el usuario lo elige-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio | Sitio Oficial</title>
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <!--Letrero JORMONTIELO-->
    <header class="header-inicio">
        <img class="logo" src="../imagenes/jormontielo.png" alt="JORMONTIELO" style="width:560px">
    </header>

    <!--Espacio para mostrar video de presentación-->
    <main class="contenedor-principal">
        <div class="tarjeta-video-presentacion">
            <div class="espacio-video">
                <!--Aquí irá el código cuando sepamos en qué formato se va a incluir el video-->
                <div class="colibri" id="colibri-izq-1"></div> <!--izq nos indica de qué lado del video estará el colibrí-->
                <div class="colibri" id="colibri-izq-2"></div>
                <div class="colibri" id="colibri-der-1"></div>
            </div>
        </div>
    </main>

<!-- Contenedor para ubicar los objetos sobre el poste -->
<div class="bloque-redes-poste">
    <!--Texto "puedes escuchar mi música en:"-->
    <h1 class="texto-redes">Puedes escuchar mi música en:</h1>

    <!--Botones que nos redirigen a redes sociales-->
    <div class="boton-redes">
        <!--SPOTIFY-->
        <a href="https://open.spotify.com/..." target="_blank">
            <img src="../imagenes/logo-spotify.png" alt="Spotify" style="width: 200px;">
        </a>
        
        <!--INSTAGRAM-->
        <a href="https://www.instagram.com/..." target="_blank">
            <img src="../imagenes/logo-instagram.png" alt="Instagram" style="width: 250px;">
        </a>
    </div>
</div>


    <!--Botones que nos redirigen a las secciones del sitio web-->
    <div class="boton-navegacion">
        <!--GALERÍA-->
        <a  href="http://127.0.0.1:5500/interfaces/galeria.html">
            <img src="../imagenes/boton-galeria.png" alt="Ir a perfil de Spotify de JOR MONTIELO" style="width: 150px;">
        </a>
        <!--MERCH-->
        <a  href="http://127.0.0.1:5500/interfaces/merch.html">
            <img src="../imagenes/boton-merch.png" alt="Ir a perfil de Instagram de JOR MONTIELO" style="width: 140px;">
        </a>
        <!--PRÓXIMOS EVENTOS-->
        <a href="../interfaces/eventos.html">
            <img src="../imagenes/boton-eventos.png" alt="Próximos Eventos JOR MONTIELO" style="width: 150px;">
        </a>
    </div>
</body>
</html>
